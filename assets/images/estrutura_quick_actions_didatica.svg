<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .small { font: 500 14px Arial, Helvetica, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .rowbox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 20; }
      .itembox { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 16; }
      .line { stroke: #94a3b8; stroke-width: 3; }
      .icon { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1100" height="700" fill="#f8fafc"/>

  <text x="550" y="60" text-anchor="middle" class="title">Estrutura do Quick Actions Menu</text>

  <!-- Container -->
  <g filter="url(#shadow)">
    <rect x="120" y="100" width="860" height="480" class="box"/>
  </g>
  <text x="550" y="135" text-anchor="middle" class="label">Container</text>

  <!-- Row -->
  <g filter="url(#shadow)">
    <rect x="200" y="180" width="700" height="300" class="rowbox"/>
  </g>
  <text x="550" y="215" text-anchor="middle" class="label">Row</text>

  <line x1="550" y1="145" x2="550" y2="180" class="line"/>


  <!-- QuickActionItem 1 -->
  <g filter="url(#shadow)">
    <rect x="220" y="260" width="110" height="160" class="itembox"/>
  </g>

  <!-- icon -->
  <circle cx="275" cy="305" r="18" class="icon"/>
  <rect x="267" y="285" width="16" height="16" rx="4" class="icon"/>

  <!-- text -->
  <text x="275" y="350" text-anchor="middle" class="small">Quick</text>
  <text x="275" y="370" text-anchor="middle" class="small">Action</text>

  <!-- QuickActionItem 2 -->
  <g filter="url(#shadow)">
    <rect x="350" y="260" width="110" height="160" class="itembox"/>
  </g>

  <!-- icon -->
  <circle cx="405" cy="305" r="18" class="icon"/>
  <rect x="397" y="285" width="16" height="16" rx="4" class="icon"/>

  <!-- text -->
  <text x="405" y="350" text-anchor="middle" class="small">Quick</text>
  <text x="405" y="370" text-anchor="middle" class="small">Action</text>

  <!-- QuickActionItem 3 -->
  <g filter="url(#shadow)">
    <rect x="480" y="260" width="110" height="160" class="itembox"/>
  </g>

  <!-- icon -->
  <circle cx="535" cy="305" r="18" class="icon"/>
  <rect x="527" y="285" width="16" height="16" rx="4" class="icon"/>

  <!-- text -->
  <text x="535" y="350" text-anchor="middle" class="small">Quick</text>
  <text x="535" y="370" text-anchor="middle" class="small">Action</text>

  <!-- QuickActionItem 4 -->
  <g filter="url(#shadow)">
    <rect x="610" y="260" width="110" height="160" class="itembox"/>
  </g>

  <!-- icon -->
  <circle cx="665" cy="305" r="18" class="icon"/>
  <rect x="657" y="285" width="16" height="16" rx="4" class="icon"/>

  <!-- text -->
  <text x="665" y="350" text-anchor="middle" class="small">Quick</text>
  <text x="665" y="370" text-anchor="middle" class="small">Action</text>

  <!-- QuickActionItem 5 -->
  <g filter="url(#shadow)">
    <rect x="740" y="260" width="110" height="160" class="itembox"/>
  </g>

  <!-- icon -->
  <circle cx="795" cy="305" r="18" class="icon"/>
  <rect x="787" y="285" width="16" height="16" rx="4" class="icon"/>

  <!-- text -->
  <text x="795" y="350" text-anchor="middle" class="small">Quick</text>
  <text x="795" y="370" text-anchor="middle" class="small">Action</text>

</svg>